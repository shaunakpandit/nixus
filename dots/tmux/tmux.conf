# CONFIG:
set -a terminal-features "tmux-256color:RGB"
set -g prefix C-a
set -g mode-keys vi
set -gq allow-passthrough on
set -g visual-activity off
set -g mouse on
set -wg automatic-rename on

## STATUS BAR:
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 1
set -g status-style "bg=default"
set -g window-status-format "#[fg=magenta] #W "
set -g window-status-current-format "#[fg=#000000#, bg=cyan] #W "
# tmux Formats https://github.com/tmux/tmux/wiki/Formats#summary-of-modifiers
# tmux variables https://man.openbsd.org/tmux#FORMATS
# cyan -> primary; magenta->secondary
# directory rendering: https://unix.stackexchange.com/questions/260147/tmux-status-line-and-current-path-format
set -g status-left "#{?client_prefix,#[fg=#000000#,bg=cyan] PREFIX , #{?pane_in_mode, #[fg=#000000#,bg=cyan] COPY , }}#[fg=magenta#, bg=#000000] #S #{=|-24|…;s|$HOME|~|:pane_current_path} #[fg=cyan]#{pane_current_command}"
# set -g status-left "#{?client_prefix,#[fg=#000000#,bg=cyan] PREFIX , }#[fg=magenta#, bg=#000000] #S #{=|-24|…;s|$HOME|~|:pane_current_path} #[fg=cyan]#{pane_current_command}"
set -g status-left-length 100
set -g status-right "#[fg=magenta]%Y-%m-%d %R"
# color of command line
set -g message-style 'bg=default fg=cyan'

## BINDS:
# unbind sessions detatch so I dont fatfinger window zap 
unbind d

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf
# switch panes using Alt-arrow without prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D
# https://superuser.com/questions/343572/how-do-i-reorder-tmux-windows
bind-key -n C-S-h swap-window -t -1\; select-window -t -1
bind-key -n C-S-l swap-window -t +1\; select-window -t +1
bind-key j command-prompt -I "#W" "rename-window '%%'"

## FLOATING WINDOWS:
# popup for floating terminal
bind t display-popup -w 75% -h 75% -d "#{pane_current_path}" -E

bind b display-popup -w 90% -h 90% -E 'nvim +DBUI'

bind k display-popup -w 75% -h 75% -d "~/notes/daily" -E '
  filename="$(date +%Y-%m-%d).md"
  title="${filename%.md}"

  if [ ! -f "$filename" ]; then
    printf "# %s\n\n## Todo\n\n" "$title" > "$filename"

    prev_file="$(ls -1 *.md 2>/dev/null | grep -E "^[0-9]{4}-[0-9]{2}-[0-9]{2}\.md$" | sort -r | grep -A999 "^$filename$" | tail -n +2 | head -n1)"

    if [ -n "$prev_file" ] && [ -f "$prev_file" ]; then
      awk "
        /^## Todo/ { in_todos=1; next }
        /^## / { in_todos=0 }
        in_todos && /^- \[ \]/ { print }
      " "$prev_file" >> "$filename"
    fi
  fi

  exec nvim "$filename"
'

bind u display-popup -w 75% -h 75% -d "~/notes/daily" -E "sh -c 'file=\$(fzf --reverse); [ -n \"\$file\" ] && nvim \"\$file\"'"

bind g display-popup -w 90% -h 90% -d "#{pane_current_path}" -E "lazygit"

bind j display-popup -w 30% -h 15% -E "tmux list-windows -a -F '#S:#W' \
  | fzf --reverse \
  | xargs -r tmux switch-client -t"



